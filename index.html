<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="form-header">
            <h1>Cadastro de Cliente</h1>
            <p>Registre novos clientes e gerencie os cadastros já salvos.</p>
        </section>

        <form id="clientForm" class="registration-form">
            <input type="hidden" id="clientId" name="clientId">

            <div class="input-group">
                <label for="fullname">Nome Completo</label>
                <input type="text" id="fullname" name="fullname" placeholder="Ex: João Silva" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="joao@exemplo.com" required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="phone">Telefone</label>
                    <input type="tel" id="phone" name="phone" placeholder="(11) 99999-9999">
                </div>

                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Finalizar Cadastro</button>
                <button type="button" id="cancelEditBtn" class="btn-cancel hidden">Cancelar Edição</button>
            </div>

            <p id="formMessage" class="form-message" aria-live="polite"></p>
        </form>

        <section class="dashboard" aria-labelledby="dashboardTitle">
            <div class="dashboard-header">
                <div>
                    <h2 id="dashboardTitle">Carteira de Clientes</h2>
                    <p>Visualize, edite ou exclua os cadastros de clientes.</p>
                </div>
                <span id="clientsCount" class="badge">0 clientes</span>
            </div>

            <div id="detailsPanel" class="details-panel hidden">
                <h3>Detalhes do cliente</h3>
                <div id="detailsContent"></div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>CPF</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="clientsBody"></tbody>
                </table>
                <div id="emptyState" class="empty-state">Nenhum cliente cadastrado ainda.</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
